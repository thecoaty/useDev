<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UseDev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="./css/cabecalho.css">
<link rel="stylesheet" href="./css/banner.css">
<link rel="stylesheet" href="./css/categorias.css">
<link rel="stylesheet" href="./css/promocoes.css">
<link rel="stylesheet" href="./css/newsletter.css">
<link rel="stylesheet" href="./css/rodape.css">
</head>
<body>
   <header class="cabecalho">
    <nav class="cabecalhoNav">
        <ul class="cabecalhoNavList">
            <li>
                <h1 class="cabecalhoLogo">
                    <img src="./assets/icons/logo.svg" alt="logo da useDev">
                </h1>
            </li>
            <li class="cabecalhoNavListItem">
                <a href="#" class="cabecalhoNavListLink">
                    Sobre nós
                </a>
            </li>
            <li class="cabecalhoNavListItem cabecalhoNavListItem-Input">
                <input type="search" id="search" placeholder="O que você procura?" class="cabecalhoNavListInput">
                <img src="./assets/icons/search.svg" alt="lupa" class="pesquisa-icon">
            </li>
            <li class="cabecalhoNavListItem">
                <a href="#" class="cabecalhoNavListLink cabecalhoNavListLink-Login">Login</a>
            </li>
            <li class="cabecalhoNavListItem">
                <a href="#" class="cabecalhoNavListLink cabecalhoNavListLink-Perfil">
                    <img src="./assets/icons/perfil.svg" alt="perfil">
                </a>
            </li>
            <li class="cabecalhoNavListItem">
                <a href="#" class="cabecalhoNavListLink cabecalhoNavListLink-Carrinho">
                    <img src="./assets/icons/carrinho.svg" alt="carrinho">
                </a>
            </li>
        </ul>
    </nav>
   </header>
    <section class="banner">
        <img class="bannerImagem" src="./assets/banner.png" alt="Uma pessoa vestindo uma camiseta da UseDev">
        <div class="bannerContainer">
            <h2 class="bannerContainer-titulo">Hora de abraçar <span>o seu lado geek!</span></h2>
            <button class="bannerContainer-botao">Ver as novidades!</button>
        </div>
    </section>
</body>
</html>
